name: Validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  local-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate example metadata
        run: make validate
      - name: Check whitespace
        run: git diff --check
